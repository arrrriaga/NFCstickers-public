<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NFC sticker — Legal</title>
<style>
  :root{--blue:#2563EB;--ink:#0E1726;--muted:#51607A;--bg:#F6F8FC;--card:#fff;--bd:#DBE3EE}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:40px 20px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .logo{width:44px;height:44px;border-radius:12px;background:var(--blue);color:#fff;display:flex;
    align-items:center;justify-content:center;font-size:22px}
  h1{font-size:26px;margin:0} .sub{color:var(--muted);margin:4px 0 28px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:6px 18px;margin-bottom:14px}
  a.row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;text-decoration:none;color:var(--ink);border-bottom:1px solid var(--bd)}
  a.row:last-child{border-bottom:none} a.row:hover{color:var(--blue)}
  .chev{color:#93A0B4} footer{color:var(--muted);font-size:13px;margin-top:24px}
  a{color:var(--blue)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="logo">📶</div><div><h1>NFC sticker</h1></div></div>
  <p class="sub">Documentos legales · Legal documents</p>
  <div class="card">
    <a class="row" href="./privacy.html"><span>Política de privacidad · Privacy Policy</span><span class="chev">›</span></a>
    <a class="row" href="./terms.html"><span>Términos de uso · Terms of Use</span><span class="chev">›</span></a>
    <a class="row" href="./delete.html"><span>Eliminación de datos · Data deletion</span><span class="chev">›</span></a>
  </div>
  <footer>Operado por Francisco Arriaga Velasco (persona física) · fran.arrrri@gmail.com</footer>
</div>
</body>
</html>
